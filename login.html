<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MITS Club Portal - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #56ADB8 100%);
    }

    .login-container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      width: 420px;
      animation: slideIn 0.5s;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .college-header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }

    .college-header h1 {
      font-size: 1.8em;
      color: #667eea;
      margin-bottom: 5px;
    }

    .college-header p {
      font-size: 14px;
      color: #666;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
      font-size: 15px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea 0%, #56ADB8 100%);
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }

    .error {
      margin-top: 15px;
      padding: 12px;
      background: #fee;
      color: #c33;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
      border-left: 4px solid #c33;
    }

    .demo-credentials {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-top: 25px;
      border-radius: 8px;
    }

    .demo-credentials h4 {
      margin-bottom: 12px;
      color: #667eea;
      font-size: 14px;
    }

    .demo-credentials p {
      margin: 6px 0;
      font-size: 13px;
      color: #555;
    }

    .demo-credentials strong {
      color: #333;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="college-header">
      <h1>🎓 MITS Gwalior</h1>
      <p>Madhav Institute of Technology & Science</p>
      <p style="font-weight: 600; color: #667eea; margin-top: 5px;">Club Management Portal</p>
    </div>

    <h2>Login</h2>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" required>
      </div>
      <button type="submit">Login</button>
      <div id="error" class="error"></div>
    </form>

    <div class="demo-credentials">
      <h4>📝 Demo Credentials</h4>
      <p><strong>Admin:</strong> admin / admin123</p>
      <p><strong>President:</strong> president / pres123</p>
      <p><strong>Member:</strong> member / mem123</p>
    </div>

    <div class="footer">
      <p>Developed by: <strong>Your Name | Roll No: XX</strong></p>
      <p style="margin-top: 5px;">Micro Project 2026</p>
    </div>
  </div>

  <script>
    const users = [
      { 
        username: "admin", 
        password: "admin123", 
        role: "admin", 
        name: "Admin User",
        email: "admin@mitsgwalior.in"
      },
      { 
        username: "president", 
        password: "pres123", 
        role: "president", 
        name: "Club President",
        email: "president@mitsgwalior.in"
      },
      { 
        username: "member", 
        password: "mem123", 
        role: "member", 
        name: "Club Member",
        email: "member@mitsgwalior.in"
      }
    ];

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorBox = document.getElementById("error");

      const user = users.find(u => u.username === username && u.password === password);

      if (user) {
        const session = {
          username: user.username,
          role: user.role,
          name: user.name,
          email: user.email,
          loggedIn: true,
          loginTime: new Date().toISOString()
        };
        localStorage.setItem("club_session", JSON.stringify(session));
        window.location.href = "index.html";
      } else {
        errorBox.style.display = "block";
        errorBox.textContent = "❌ Invalid username or password";
        setTimeout(() => {
          errorBox.style.display = "none";
        }, 3000);
      }
    });
  </script>
</body>
</html>
